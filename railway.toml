[build]
builder = "NIXPACKS"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[env]
NODE_ENV = "production"
PORT = "3000"

[[services]]
name = "bot-dashboard"

[services.variables]
DASHBOARD_ENABLED = "true"
DASHBOARD_BIND = "0.0.0.0"
DASHBOARD_PORT = "3000"
PUBLIC_BASE_URL = "https://shadow-production-be95.up.railway.app"
PUBLIC_BOT_NAME = "Vault"
PUBLIC_SERVICE_NAME = "Vault Marketplace"
TERMS_URL = "https://shadow-production-be95.up.railway.app/terms"
PRIVACY_URL = "https://shadow-production-be95.up.railway.app/privacy"
DEFAULT_PUBLIC_BASE_URL = "https://shadow-production-be95.up.railway.app"
